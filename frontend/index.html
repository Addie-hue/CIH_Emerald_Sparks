<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Flood Navigation</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="map"></div>

  <div id="reconnect-banner" class="banner hidden">Reconnecting...</div>

  <div class="panel-left">
    <div id="stranded-banner" class="banner error hidden"
      style="position: relative; left: auto; transform: none; top: auto; margin-bottom: 10px;">
      No road route available — vehicle isolated. Recommend dispatching by boat or air rescue.
      <button id="dismiss-stranded" class="banner-close">&times;</button>
    </div>

    <!-- Card 1: Navigation -->
    <div class="card">
      <h2>Navigation</h2>
      <div class="input-group">
        <label>Origin (Place Name or Lat,Lon)</label>
        <div style="display:flex; gap: 4px;">
          <input type="text" id="input-origin" placeholder="e.g. Paris" value="10.0, 20.0" style="flex:1;">
          <button id="btn-pick-origin" class="speed-btn" style="padding: 0 10px;" title="Pick on map">📍</button>
        </div>
        <div class="input-message" id="msg-origin"></div>
      </div>
      <div class="input-group">
        <label>Destination (Place Name or Lat,Lon)</label>
        <div style="display:flex; gap: 4px;">
          <input type="text" id="input-destination" placeholder="e.g. Lyon" value="10.1, 20.1" style="flex:1;">
          <button id="btn-pick-dest" class="speed-btn" style="padding: 0 10px;" title="Pick on map">📍</button>
        </div>
        <div class="input-message" id="msg-dest"></div>
      </div>

      <div class="input-group"
        style="flex-direction: row; align-items: center; justify-content: space-between; margin-top: 4px;">
        <label style="margin: 0;">Simulation Speed</label>
        <div class="speed-control">
          <button id="btn-speed-1" class="speed-btn active">1x</button>
          <button id="btn-speed-10" class="speed-btn">10x</button>
          <button id="btn-speed-50" class="speed-btn">50x</button>
        </div>
      </div>

      <div style="display: flex; gap: 8px;">
        <button id="btn-start-nav" class="primary-btn" style="flex: 1;">Start Navigation</button>
        <button id="btn-stop-nav" class="secondary-btn hidden" style="flex: 1; background: var(--error-red); color: white;">Stop Navigation</button>
      </div>

      <div class="stats-row">
        <div class="stat">
          <span class="stat-label">Speed</span>
          <span class="stat-value">60 km/h</span>
        </div>
        <div class="stat">
          <span class="stat-label">Remaining</span>
          <span class="stat-value" id="val-distance">-- km</span>
        </div>
        <div class="stat">
          <span class="stat-label">ETA</span>
          <div style="display: flex; align-items: center; gap: 8px;">
            <span class="stat-value" id="val-eta">-- min</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Card 2: Hazard Controls -->
    <div class="card">
      <h2>Hazard Controls</h2>
      <div class="hazard-options">
        <button id="btn-hazard-flood" class="hazard-btn flood active">Flood Zone</button>
        <button id="btn-hazard-landslide" class="hazard-btn landslide">Landslide Zone</button>
      </div>
      <p id="hazard-instruction" class="instruction-text">Click map to place flood zone</p>

      <div class="active-hazards">
        <h3>Active Hazards</h3>
        <ul id="hazard-list"></ul>
      </div>
    </div>
  </div>

  <div id="inline-flood-input" class="inline-popup hidden" style="flex-direction: column; gap: 8px; width: max-content;">
    <label style="margin: 0; font-weight: 600;">Select Flood Severity:</label>
    <div style="display: flex; gap: 6px;">
      <button id="btn-severity-yellow" class="severity-btn sev-yellow">Yellow</button>
      <button id="btn-severity-orange" class="severity-btn sev-orange">Orange</button>
      <button id="btn-severity-red" class="severity-btn sev-red">Red</button>
      <button id="btn-cancel-flood" class="cancel-btn" style="padding: 6px 12px;">Cancel</button>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="map.js?v=3"></script>
  <script src="controls.js?v=3"></script>
</body>

</html>

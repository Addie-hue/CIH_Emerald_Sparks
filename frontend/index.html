<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Live flood and landslide-aware emergency navigation for Mangaluru.">
    <title>CIH 2026 — Navigation</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Nav panel ───────────────────────────────────────────────────────────── -->
<div id="nav-panel" class="panel">

    <!-- Header -->
    <div class="panel-header">
        <div class="panel-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
            Navigation
        </div>
        <div id="ws-badge" class="badge badge-offline">● Offline</div>
    </div>

    <!-- SETUP MODE: click-to-set origin / destination -->
    <div id="setup-section">
        <p id="setup-hint" class="setup-hint">Click the map to set <strong>origin</strong></p>

        <div class="coord-row" id="origin-row">
            <span class="coord-icon origin-icon">●</span>
            <span class="coord-label" id="origin-label">Not set</span>
            <button class="coord-clear" id="origin-clear" onclick="clearOrigin()" title="Clear">✕</button>
        </div>
        <div class="coord-row" id="dest-row">
            <span class="coord-icon dest-icon">▼</span>
            <span class="coord-label" id="dest-label">Not set</span>
            <button class="coord-clear" id="dest-clear" onclick="clearDestination()" title="Clear">✕</button>
        </div>

        <button id="start-btn" class="action-btn" disabled onclick="startNavigation()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Start Navigation
        </button>
    </div>

    <!-- ACTIVE TRIP: live stats, stop button -->
    <div id="trip-section" class="hidden">
        <div class="stats-row">
            <div class="stat-cell">
                <span class="stat-val" id="stat-speed">—</span>
                <span class="stat-lbl">km/h</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-cell">
                <span class="stat-val" id="stat-dist">—</span>
                <span class="stat-lbl">km left</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-cell">
                <span class="stat-val" id="stat-eta">—</span>
                <span class="stat-lbl">min ETA</span>
            </div>
        </div>
        <div id="status-banner" class="status-banner hidden"></div>
        <button id="stop-btn" class="stop-btn" onclick="stopNavigation()">
            ■ End Trip
        </button>
    </div>

</div>

<!-- ── Hazard panel ─────────────────────────────────────────────────────────── -->
<div id="hazard-panel" class="panel hazard-panel">
    <div class="panel-header">
        <div class="panel-title">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            Hazards
        </div>
    </div>

    <!-- Flood tool -->
    <div class="hz-tool-row">
        <button id="flood-tool-btn" class="hz-btn flood-btn" onclick="activateFloodTool()">
            💧 Add Flood Zone
        </button>
        <button id="slide-tool-btn" class="hz-btn slide-btn" onclick="activateLandslideTool()">
            ⛰ Add Landslide
        </button>
    </div>

    <!-- Severity chip picker — shown after map click for flood -->
    <div id="severity-picker" class="hidden">
        <p class="sev-prompt">Select flood severity:</p>
        <div class="chip-row">
            <button class="chip chip-mild"    onclick="confirmFloodZone('mild')">Mild</button>
            <button class="chip chip-caution" onclick="confirmFloodZone('caution')">Caution</button>
            <button class="chip chip-severe"  onclick="confirmFloodZone('severe')">Severe</button>
            <button class="chip chip-blocked" onclick="confirmFloodZone('blocked')">Blocked</button>
        </div>
        <button class="cancel-small" onclick="cancelHazardTool()">Cancel</button>
    </div>

    <!-- Active zone list -->
    <div id="active-zones" class="hidden">
        <div class="field-label" style="margin:8px 0 4px">Active hazards</div>
        <ul id="zone-list"></ul>
    </div>
</div>

<!-- ── Map ──────────────────────────────────────────────────────────────────── -->
<div id="map"></div>

<!-- ── Toast notifications ──────────────────────────────────────────────────── -->
<div id="toast-container"></div>

<!-- Scripts — order matters: map first, then vehicle, then hazard controls -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="map.js"></script>
<script src="vehicle.js"></script>
<script src="hazard_controls.js"></script>
</body>
</html>
